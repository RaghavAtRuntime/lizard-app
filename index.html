<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lizard!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow-y: auto;
      position: relative;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 60% 20%, rgba(99, 220, 120, 0.12) 0%, transparent 55%),
                  radial-gradient(ellipse at 20% 80%, rgba(56, 189, 248, 0.08) 0%, transparent 45%);
      pointer-events: none;
    }

    h1 {
      color: #f0fdf4;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      text-shadow: 0 0 40px rgba(99, 220, 120, 0.35);
      margin-bottom: 0.5rem;
      pointer-events: none;
      user-select: none;
    }

    p.hint {
      color: rgba(240, 253, 244, 0.55);
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      pointer-events: none;
      user-select: none;
    }

    /* ── Lizard button ── */
    #lizard-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      outline: none;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
      transition: transform 0.12s ease, filter 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      width: min(340px, 85vw);
    }

    #lizard-btn:hover {
      filter: drop-shadow(0 10px 28px rgba(0,0,0,0.5)) brightness(1.12);
      transform: scale(1.05) rotate(-2deg);
    }

    #lizard-btn:active {
      transform: scale(0.93) rotate(3deg);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)) brightness(1.2);
    }

    /* ── Stickers ── */
    .sticker {
      position: fixed;
      pointer-events: none;
      z-index: 10;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 wobble 1.6s ease-in-out 0.4s infinite;
      transform-origin: center center;
      opacity: 0;
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(var(--rot-start)); opacity: 0; }
      60%  { opacity: 1; }
      100% { transform: scale(1) rotate(var(--rot-end));   opacity: 1; }
    }

    @keyframes wobble {
      0%, 100% { transform: scale(1)    rotate(var(--rot-end)); }
      50%       { transform: scale(1.08) rotate(calc(var(--rot-end) + 6deg)); }
    }

    /* ── Ripple flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(99, 220, 120, 0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.08s ease;
    }
    #flash.active { opacity: 1; }

    /* ── Small-screen adjustments ── */
    @media (max-width: 400px) {
      p.hint { margin-bottom: 1.5rem; }
      #lizard-btn { width: 90vw; }
    }
  </style>
</head>
<body>

  <h1>🦎 Lizard! 🦎</h1>
  <p class="hint">Press the lizard!</p>

  <!-- Lizard button -->
  <button id="lizard-btn" aria-label="Play Lizard sound">
    <img src="lizard.svg" alt="Cartoon lizard">
  </button>

  <div id="flash"></div>

  <script>
    /* ────────── Hint text: Tap vs Press ────────── */
    const hint = document.querySelector('p.hint');
    const coarseQuery = window.matchMedia('(pointer: coarse)');
    function updateHint(e) {
      hint.textContent = e.matches ? 'Tap the lizard!' : 'Press the lizard!';
    }
    updateHint(coarseQuery);
    coarseQuery.addEventListener('change', updateHint);

    /* ────────── Audio ────────── */
    function playLizardSound() {
      const audio = new Audio('lizard-button.mp3');
      audio.play().catch(() => { /* autoplay may be blocked before user interaction */ });
    }

    /* ────────── Sticker spawning ────────── */
    const STICKER_URL = 'lizard.svg';

    let stickerCount = 0;
    const MAX_STICKERS = 60;

    function spawnStickers(n = 12) {
      const isSmallScreen = window.innerWidth <= 400;
      const minSize = isSmallScreen ? 40 : 60;
      const maxSize = isSmallScreen ? 80 : 100;
      for (let i = 0; i < n; i++) {
        setTimeout(() => {
          if (stickerCount >= MAX_STICKERS) return;
          stickerCount++;

          const size = minSize + Math.random() * maxSize;
          const x = Math.random() * (window.innerWidth  - size);
          const y = Math.random() * (window.innerHeight - size);
          const rotStart = (Math.random() - 0.5) * 360;
          const rotEnd   = (Math.random() - 0.5) * 40;

          const img = document.createElement('img');
          img.src = STICKER_URL;
          img.className = 'sticker';
          img.width  = size;
          img.height = size;
          img.style.left = x + 'px';
          img.style.top  = y + 'px';
          img.style.setProperty('--rot-start', rotStart + 'deg');
          img.style.setProperty('--rot-end',   rotEnd   + 'deg');
          img.alt = 'lizard sticker';

          document.body.appendChild(img);

          // auto-remove after a while if we are near the cap
          if (stickerCount > MAX_STICKERS * 0.8) {
            setTimeout(() => {
              img.style.transition = 'opacity 0.5s';
              img.style.opacity = '0';
              setTimeout(() => { img.remove(); stickerCount--; }, 500);
            }, 6000 + Math.random() * 4000);
          }
        }, i * 60);
      }
    }

    /* ────────── Flash effect ────────── */
    const flash = document.getElementById('flash');
    function doFlash() {
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 120);
    }

    /* ────────── Button handler ────────── */
    const btn = document.getElementById('lizard-btn');
    btn.addEventListener('click', () => {
      playLizardSound();
      doFlash();
      spawnStickers(12);
    });
  </script>
</body>
</html>
